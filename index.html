<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gray RP World</title>
<style>
body { margin: 0; overflow: hidden; background: #000; }
canvas { display: block; }
#joystick {
  position: absolute;
  bottom: 40px;
  left: 40px;
  width: 120px;
  height: 120px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
  touch-action: none;
}
#stick {
  position: absolute;
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  left: 30px;
  top: 30px;
}
</style>
</head>
<body>

<div id="joystick">
  <div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);

const textureLoader = new THREE.TextureLoader();
const texture = textureLoader.load('https://threejsfundamentals.org/threejs/resources/images/checker.png');
texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
texture.repeat.set(20, 20);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({ map: texture })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

/* === Персонаж в стиле "тёмная худи" === */

const player = new THREE.Group();

// тело (чёрная худи)
const body = new THREE.Mesh(
  new THREE.BoxGeometry(1,1.5,0.6),
  new THREE.MeshStandardMaterial({ color: 0x111111 })
);
body.position.y = 1.25;
player.add(body);

// голова
const head = new THREE.Mesh(
  new THREE.BoxGeometry(0.8,0.8,0.8),
  new THREE.MeshStandardMaterial({ color: 0xffdbac })
);
head.position.y = 2.2;
player.add(head);

// ноги
const legMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });

const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.4,1,0.4), legMaterial);
leg1.position.set(-0.25,0.5,0);
player.add(leg1);

const leg2 = new THREE.Mesh(new THREE.BoxGeometry(0.4,1,0.4), legMaterial);
leg2.position.set(0.25,0.5,0);
player.add(leg2);

scene.add(player);

/* === Камера вращение пальцем === */

let rotationY = 0;
let isDragging = false;
let prevX = 0;

document.addEventListener("touchstart", e => {
  if (e.target.id !== "joystick" && e.target.id !== "stick") {
    isDragging = true;
    prevX = e.touches[0].clientX;
  }
});

document.addEventListener("touchmove", e => {
  if (isDragging) {
    let deltaX = e.touches[0].clientX - prevX;
    rotationY -= deltaX * 0.005;
    prevX = e.touches[0].clientX;
  }
});

document.addEventListener("touchend", () => isDragging = false);

/* === Джойстик === */

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let moveX = 0;
let moveZ = 0;

joystick.addEventListener("touchmove", function(e) {
  const rect = joystick.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left - 60;
  const y = e.touches[0].clientY - rect.top - 60;

  const max = 40;
  const dx = Math.max(-max, Math.min(max, x));
  const dy = Math.max(-max, Math.min(max, y));

  stick.style.left = dx + 30 + "px";
  stick.style.top = dy + 30 + "px";

  moveX = dx / max;
  moveZ = dy / max;
});

joystick.addEventListener("touchend", function() {
  stick.style.left = "30px";
  stick.style.top = "30px";
  moveX = 0;
  moveZ = 0;
});

/* === Игровой цикл === */

function animate() {
  requestAnimationFrame(animate);

  player.position.x += moveX * 0.1;
  player.position.z += moveZ * 0.1;

  player.rotation.y = rotationY;

  camera.position.x = player.position.x + Math.sin(rotationY) * 6;
  camera.position.z = player.position.z + Math.cos(rotationY) * 6;
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
