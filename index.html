<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gray RP World HD</title>
<style>
body { margin: 0; overflow: hidden; }
canvas { display: block; }
#joystick {
  position: absolute;
  bottom: 40px;
  left: 40px;
  width: 120px;
  height: 120px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
  touch-action: none;
}
#stick {
  position: absolute;
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  left: 30px;
  top: 30px;
}
</style>
</head>
<body>

<div id="joystick">
  <div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Свет
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
light.castShadow = true;
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// HD Пол
const textureLoader = new THREE.TextureLoader();
const texture = textureLoader.load('https://threejsfundamentals.org/threejs/resources/images/checker.png');
texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
texture.repeat.set(100, 100);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(1000,1000),
  new THREE.MeshStandardMaterial({ map: texture })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Загрузка персонажа
let player;
let mixer;

const loader = new THREE.GLTFLoader();
loader.load(
  "https://threejs.org/examples/models/gltf/Soldier.glb",
  function (gltf) {
    player = gltf.scene;
    player.scale.set(1.5,1.5,1.5);
    player.traverse(obj => obj.castShadow = true);
    scene.add(player);

    mixer = new THREE.AnimationMixer(player);
    const action = mixer.clipAction(gltf.animations[1]);
    action.play();
  }
);

// Джойстик
const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let moveX = 0;
let moveZ = 0;

joystick.addEventListener("touchmove", function(e) {
  const rect = joystick.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left - 60;
  const y = e.touches[0].clientY - rect.top - 60;

  const max = 40;
  const dx = Math.max(-max, Math.min(max, x));
  const dy = Math.max(-max, Math.min(max, y));

  stick.style.left = dx + 30 + "px";
  stick.style.top = dy + 30 + "px";

  moveX = dx / max;
  moveZ = dy / max;
});

joystick.addEventListener("touchend", function() {
  stick.style.left = "30px";
  stick.style.top = "30px";
  moveX = 0;
  moveZ = 0;
});

// Камера вращение
let rotationY = 0;
let isDragging = false;
let prevX = 0;

document.addEventListener("touchstart", e => {
  if (e.target.id !== "joystick" && e.target.id !== "stick") {
    isDragging = true;
    prevX = e.touches[0].clientX;
  }
});

document.addEventListener("touchmove", e => {
  if (isDragging) {
    let deltaX = e.touches[0].clientX - prevX;
    rotationY -= deltaX * 0.005;
    prevX = e.touches[0].clientX;
  }
});
